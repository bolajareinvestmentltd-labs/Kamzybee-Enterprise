<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B3D91;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5bb8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4B400;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FFD54F;stop-opacity:0.7" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Accent overlay gradient -->
  <rect width="1920" height="1080" fill="url(#accentGrad)" opacity="0.15"/>
  
  <!-- Radial gradient overlays for depth -->
  <circle cx="1920" cy="0" r="1200" fill="#22C55E" opacity="0.08"/>
  <circle cx="0" cy="1080" r="800" fill="#F4B400" opacity="0.1"/>
  
  <!-- KamzyBee Logo Mark (top left area) -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="100" height="100" rx="12" fill="#F4B400" opacity="0.95"/>
    <circle cx="35" cy="35" r="8" fill="#0B3D91"/>
    <circle cx="65" cy="35" r="8" fill="#0B3D91"/>
    <rect x="30" y="55" width="40" height="20" rx="4" fill="#0B3D91"/>
  </g>
  
  <!-- Main headline -->
  <text x="960" y="150" font-family="Poppins, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="84" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="-1">
    Quality Tech
  </text>
  <text x="960" y="240" font-family="Poppins, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="84" font-weight="bold" fill="#F4B400" text-anchor="middle" letter-spacing="-1">
    Trusted Choice
  </text>
  
  <!-- Subheadline -->
  <text x="960" y="320" font-family="Poppins, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="300" fill="rgba(255, 255, 255, 0.85)" text-anchor="middle">
    Phones • Laptops • Accessories
  </text>
  
  <!-- Featured Products Section -->
  <!-- Smartphone (left) -->
  <g transform="translate(300, 450)">
    <rect x="0" y="0" width="140" height="280" rx="16" fill="#1F2937" stroke="#F4B400" stroke-width="3"/>
    <rect x="8" y="8" width="124" height="228" rx="12" fill="#0F172A"/>
    <circle cx="70" cy="245" r="8" fill="#374151"/>
    <rect x="20" y="30" width="100" height="160" rx="8" fill="url(#accentGrad)"/>
    <circle cx="70" cy="50" r="6" fill="#0B3D91" opacity="0.8"/>
  </g>
  
  <!-- Laptop (center) -->
  <g transform="translate(960, 380)" filter="url(#glow)">
    <rect x="0" y="0" width="280" height="180" rx="12" fill="#1F2937" stroke="#F4B400" stroke-width="3"/>
    <rect x="12" y="12" width="256" height="140" rx="8" fill="#0F172A"/>
    <rect x="20" y="20" width="240" height="100" rx="6" fill="url(#accentGrad)"/>
    <rect x="0" y="160" width="280" height="20" rx="4" fill="#374151"/>
  </g>
  
  <!-- Wireless Charger (right) -->
  <g transform="translate(1540, 480)">
    <circle cx="70" cy="70" r="70" fill="#1F2937" stroke="#F4B400" stroke-width="3"/>
    <circle cx="70" cy="70" r="55" fill="#0F172A"/>
    <circle cx="70" cy="70" r="40" fill="url(#accentGrad)"/>
    <circle cx="70" cy="70" r="25" fill="#0B3D91" opacity="0.6"/>
    <text x="70" y="78" font-family="Arial" font-size="24" fill="white" text-anchor="middle" font-weight="bold">⚡</text>
  </g>
  
  <!-- Promo Badge (bottom right) -->
  <g transform="translate(1500, 100)">
    <rect x="0" y="0" width="320" height="180" rx="20" fill="#22C55E" opacity="0.95" stroke="#F4B400" stroke-width="2"/>
    <circle cx="30" cy="30" r="24" fill="white" opacity="0.2"/>
    <text x="160" y="60" font-family="Poppins, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle">20%</text>
    <text x="160" y="95" font-family="Poppins, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">OFF</text>
    <text x="160" y="155" font-family="Poppins, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="rgba(255, 255, 255, 0.9)" text-anchor="middle">Rotary Members</text>
  </g>
  
  <!-- CTA Button area indicator -->
  <g transform="translate(400, 850)">
    <rect x="0" y="0" width="280" height="70" rx="16" fill="#F4B400" opacity="0.95"/>
    <text x="140" y="48" font-family="Poppins, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0B3D91" text-anchor="middle">SHOP NOW</text>
  </g>
  
  <!-- Floating accent shapes -->
  <circle cx="200" cy="300" r="40" fill="#F4B400" opacity="0.1"/>
  <circle cx="1750" cy="750" r="60" fill="#22C55E" opacity="0.08"/>
  <rect x="100" y="800" width="80" height="80" rx="12" fill="#F4B400" opacity="0.06" transform="rotate(45 140 840)"/>
</svg>